name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: packages/create-next-log
      - name: Build CLI
        run: npm run build
        working-directory: packages/create-next-log
      - name: Upload template
        uses: actions/upload-artifact@v4
        with:
          name: cli-build
          path: packages/create-next-log/

  build-template:
    name: Build Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: packages/template
      - name: Build
        run: npm run build
        working-directory: packages/template

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install CLI dependencies
        run: npm install
        working-directory: packages/create-next-log
      - name: Build CLI
        run: npm run build
        working-directory: packages/create-next-log
      - name: Run E2E tests
        run: bash scripts/e2e-test.sh
